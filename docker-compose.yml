services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: cartservice-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cartservice-network

  # Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: cartservice-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - cartservice-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cartservice-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cartservice-network

  # Cart Service Application
  cartservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cartservice-app
    environment:
      PORT: 8082
      MONGODB_URI: mongodb://mongodb:27017/cartservice
      ISSUER_URI: ${ISSUER_URI:-http://userservice:8081}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRODUCT_SERVICE_URL: http://productservice:8080
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    ports:
      - "8082:8082"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - cartservice-network
      - vibevault-network

volumes:
  mongo_data:
    driver: local

networks:
  cartservice-network:
    driver: bridge
  vibevault-network:
    external: true
