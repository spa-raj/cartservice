apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "cartservice.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cartservice.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "cartservice.fullname" . }}-secret
    creationPolicy: Owner
  data:
    # MongoDB Atlas connection string (includes credentials)
    - secretKey: MONGODB_URI
      remoteRef:
        key: {{ .Values.externalSecrets.mongoSecretName }}
        property: connectionString
