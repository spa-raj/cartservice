spring.application.name=cartservice
server.port=${PORT:8082}

# MongoDB (prefix changed from spring.data.mongodb to spring.mongodb in Spring Boot 4.x)
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/cartservice}

# OAuth resource server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${ISSUER_URI}

# Kafka (serializers configured in KafkaProducerConfig)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Product service URL for validation
vibevault.productservice.url=${PRODUCT_SERVICE_URL:http://localhost:8080}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
